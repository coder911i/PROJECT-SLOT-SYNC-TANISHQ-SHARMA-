services:
  - type: web
    name: slotsync-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: MANAGER_EMAIL
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: ZAPIER_SCREENING_EMAIL_WEBHOOK
        sync: false
      - key: ZAPIER_CONFIRMED_CANDIDATE
        sync: false
      - key: ZAPIER_CONFIRMED_MANAGER
        sync: false

  - type: web
    name: slotsync-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://slotsync-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
